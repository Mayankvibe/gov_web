<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
प्रोजेक्ट वंदन
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background-image:url("{{ url_for('static', filename='images/bg.jpg') }}");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.overlay{

width:100%;

min-height:100vh;

background:rgba(255,255,255,0.55);

display:flex;

justify-content:center;

align-items:center;
}

.login-card{

width:100%;

max-width:430px;

background:rgba(255,255,255,0.96);

border-radius:28px;

overflow:hidden;

box-shadow:0 20px 50px rgba(0,0,0,0.20);
}

.login-top{

height:8px;

background:linear-gradient(to right,#001f5c,#005bea,#00c6fb);
}

.login-header{

padding:35px 25px 20px;

text-align:center;
}

.logo{

width:220px;

display:block;

margin:auto;
}

.project-title{

margin-top:10px;

font-size:34px;

font-weight:700;

color:#002b6b;
}

.login-body{

padding:35px;
}

.login-heading{

text-align:center;

font-size:36px;

font-weight:700;

color:#002b6b;

margin-bottom:30px;
}

.input-group{

margin-bottom:22px;
}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

font-weight:600;
}

.input-group input,
.input-group select{

width:100%;

padding:15px;

border:2px solid #dbe4f0;

border-radius:14px;

outline:none;

font-size:15px;
}

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:linear-gradient(to right,#001f5c,#005bea);

color:white;

font-size:16px;

cursor:pointer;
}

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

color:#6b7280;
}

</style>

</head>

<body>

<div class="overlay">

<div class="login-card">

<div class="login-top"></div>

<div class="login-header">

<img
src="{{ url_for('static', filename='images/logo.png') }}"
class="logo"
alt="logo"
>

<h2 class="project-title">

प्रोजेक्ट वंदन

</h2>

</div>



<div class="login-body">

<h2 class="login-heading">

लॉगिन

</h2>



<form method="POST">


<div class="input-group">

<label>

यूजरनेम

</label>

<input
type="text"
name="username"
required
>

</div>



<div class="input-group">

<label>

पासवर्ड

</label>

<input
type="password"
name="password"
required
>

</div>



<div class="input-group">

<label>

लॉगिन प्रकार

</label>

<select
name="role"
>

<option value="user">

यूजर

</option>

<option value="admin">

एडमिन

</option>

</select>

</div>



<button
type="submit"
class="login-btn"
>

लॉगिन करें

</button>


</form>



<div class="footer">

© Government Portal

</div>

</div>

</div>

</div>

</body>

</html>
