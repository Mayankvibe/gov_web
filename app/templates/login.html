<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
प्रोजेक्ट वंदन
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BODY */

body{

min-height:100vh;

background-image:url("bg.jpg");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

/* OVERLAY */

.overlay{

width:100%;

min-height:100vh;

background:rgba(255,255,255,0.55);

display:flex;

justify-content:center;

align-items:center;
}

/* LOGIN CARD */

.login-card{

width:100%;

max-width:430px;

background:rgba(255,255,255,0.96);

border-radius:28px;

overflow:hidden;

box-shadow:0 20px 50px rgba(0,0,0,0.20);

backdrop-filter:blur(8px);
}

/* TOP BAR */

.login-top{

height:8px;

background:linear-gradient(to right,#001f5c,#005bea,#00c6fb);
}

/* HEADER */

.login-header{

padding:35px 25px 20px;

text-align:center;

background:linear-gradient(135deg,#ffffff,#f8fbff);
}

/* LOGO */

.logo{

width:220px;

height:auto;

display:block;

margin:auto;
}

/* TITLE */

.project-title{

margin-top:10px;

font-size:34px;

font-weight:700;

color:#002b6b;
}

/* SUBTITLE */

.subtitle{

margin-top:8px;

font-size:15px;

color:#4b5563;
}

/* BODY */

.login-body{

padding:35px;
}

/* LOGIN TITLE */

.login-heading{

text-align:center;

font-size:36px;

font-weight:700;

color:#002b6b;

margin-bottom:30px;
}

/* INPUT GROUP */

.input-group{

margin-bottom:22px;
}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

font-weight:600;

color:#1f2937;
}

/* INPUTS */

.input-group input,
.input-group select{

width:100%;

padding:15px;

border:2px solid #dbe4f0;

border-radius:14px;

outline:none;

font-size:15px;

background:white;

transition:0.3s;
}

.input-group input:focus,
.input-group select:focus{

border-color:#005bea;

box-shadow:0 0 0 4px rgba(0,91,234,0.10);
}

/* BUTTON */

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:linear-gradient(to right,#001f5c,#005bea);

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.3s;
}

.login-btn:hover{

opacity:0.95;

transform:translateY(-2px);
}

/* FOOTER */

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

color:#6b7280;
}

/* RESPONSIVE */

@media(max-width:768px){

.login-card{

max-width:100%;
}

.logo{

width:180px;
}

.project-title{

font-size:28px;
}

.login-heading{

font-size:30px;
}

.login-body{

padding:25px;
}

}

</style>

</head>

<body>

<div class="overlay">

<div class="login-card">

<div class="login-top"></div>

<!-- HEADER -->

<div class="login-header">

<img
src="logo.png"
class="logo"
alt="Project Vandan Logo"
>

<h2 class="project-title">
प्रोजेक्ट वंदन
</h2>

</div>

<!-- LOGIN BODY -->

<div class="login-body">

<h2 class="login-heading">
लॉगिन
</h2>

<form>

<!-- USERNAME -->

<div class="input-group">

<label>
यूजरनेम
</label>

<input
type="text"
placeholder="यूजरनेम दर्ज करें"
>

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
पासवर्ड
</label>

<input
type="password"
placeholder="पासवर्ड दर्ज करें"
>

</div>

<!-- ROLE -->

<div class="input-group">

<label>
लॉगिन प्रकार
</label>

<select>

<option>
यूजर
</option>

<option>
एडमिन
</option>

</select>

</div>

<!-- BUTTON -->

<button
type="submit"
class="login-btn"
>

लॉगिन करें

</button>

</form>

<!-- FOOTER -->

<div class="footer">

© Government Portal

</div>

</div>

</div>

</div>

</body>

</html>
