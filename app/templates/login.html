<!DOCTYPE html>
<html lang="hi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>लॉगिन - पेंशन प्रबंधन प्रणाली</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
            font-family: Arial, sans-serif;
        }

        .login-page{
            width: 100%;
        }

        .login-card{
            background-color: white;
            padding: 35px;
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* Government Logo */
        .logo{
            width: 110px;
            height: 110px;
            object-fit: contain;
            display: block;
            margin: 0 auto 15px;
        }

        
        .department-title{
            color: #0d6efd;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 4px;
        }

       
        .form-label{
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* Inputs */
        .form-control,
        .form-select{
            height: 45px;
            border-radius: 4px;
            font-size: 14px;
            border: 1px solid #cfcfcf;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow: none;
            border-color: #0d6efd;
        }

      
        .btn-primary{
            height: 45px;
            font-size: 15px;
            border-radius: 4px;
            font-weight: 600;
        }

       
        .footer-text{
            font-size: 13px;
            color: gray;
        }

       
        @media(max-width:768px){

            .login-card{
                padding: 25px;
            }

            .department-title{
                font-size: 20px;
            }

            .logo{
                width: 90px;
                height: 90px;
            }

        }

    </style>

</head>

<body>

    <div class="container-fluid login-page">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-4">

                
                <div class="login-card">

                    <div class="text-center mb-4">

                        
                        <img
                            src="https://upload.wikimedia.org/wikipedia/commons/8/87/Coat_of_arms_of_Chhattisgarh.svg"
                            alt="Chhattisgarh Government Logo"
                            class="logo"
                        >

                        <h5 class="department-title">
                            प्रोजेक्ट वंदन
                        </h5>

                        <p class="text-muted mb-0">
                            छत्तीसगढ़ शासन
                        </p>

                    </div>

                    
                    <h4 class="text-center mb-4">
                        लॉगिन
                    </h4>

                
                    <form method="POST">

                       
                        <div class="mb-3">

                            <label class="form-label">
                                यूजरनेम
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="यूजरनेम दर्ज करें"
                                required
                            >

                        </div>

                        
                        <div class="mb-3">

                            <label class="form-label">
                                पासवर्ड
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="पासवर्ड दर्ज करें"
                                required
                            >

                        </div>

                      
                        <div class="mb-4">

                            <label class="form-label">
                                लॉगिन प्रकार
                            </label>

                            <select
                                name="role"
                                class="form-select"
                            >

                                <option value="user">
                                    यूजर
                                </option>

                                <option value="admin">
                                    एडमिन
                                </option>

                            </select>

                        </div>

                       
                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >

                            लॉगिन करें

                        </button>

                    </form>

                 
                    <div class="text-center mt-4 footer-text">

                        © Government Portal

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
